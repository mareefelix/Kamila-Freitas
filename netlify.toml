[build]
  command = "NETLIFY=true NITRO_PRESET=netlify npm run build"
  publish = "dist/client"

[functions]
  directory = "netlify/functions"
  included_files = ["dist/server/**"]

[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
